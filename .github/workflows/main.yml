name: Build Magisk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3

      - name: Build Magisk
        run: |
          python3 build.py all

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: magisk-build
          path: out/*
